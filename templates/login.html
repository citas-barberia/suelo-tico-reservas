<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suelo Tico · Login Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">

    <div class="hero">
      <div class="hero-content">
        <div class="hero-badge">🔐 SUELO TICO · ADMIN</div>
        <h1>Ingreso de administrador</h1>
        <p class="subtitulo">Accede al panel para gestionar reservas, pagos, historial y retos.</p>
      </div>
    </div>

    <div class="admin-topbar">
      <div>
        <h2 style="margin-bottom:4px;">🔐 Login Admin</h2>
        <p class="subtitulo">Ingresa tus credenciales</p>
      </div>

      <div class="acciones-inline">
        <a class="btn-secundario" href="{{ url_for('index') }}">⚽ Volver a Reservas</a>
      </div>
    </div>

    {% if mensaje %}
      <div class="mensaje error">{{ mensaje }}</div>
    {% endif %}

    <div class="card" style="max-width:560px; margin:0 auto;">
      <div class="section-title">
        <h2>👤 Credenciales</h2>
      </div>

      <form method="POST" action="{{ url_for('login_admin') }}" class="formulario">
        <div>
          <label>Usuario</label>
          <input type="text" name="usuario" placeholder="admin" required>
        </div>

        <div>
          <label>Contraseña</label>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit">✅ Entrar</button>
      </form>

      <p class="subtitulo" style="margin-top:12px;">
        Por defecto: <strong>admin</strong> / <strong>1234</strong>
      </p>
    </div>

  </div>
</body>
</html>
